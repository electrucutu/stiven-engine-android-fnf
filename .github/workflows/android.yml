name: Compilar APK Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Obtener repositorio
        uses: actions/checkout@v4

      - name: Descargar y descomprimir juego
        run: |
          curl -L -o stivenengine.zip "https://litter.catbox.moe/s7iobo2r01letsta.zip"
          unzip -o stivenengine.zip -d temp_extract
          rm stivenengine.zip
          
          # Buscar el archivo de proyecto de FNF y mover todo a la raíz
          PROJECT_FILE=$(find temp_extract -iname "project.xml" | head -n 1)
          if [ -n "$PROJECT_FILE" ]; then
            PROJECT_DIR=$(dirname "$PROJECT_FILE")
            echo "Archivos encontrados en $PROJECT_DIR, moviendo a la raíz..."
            cp -rn "$PROJECT_DIR"/* . 2>/dev/null || true
          fi
          rm -rf temp_extract

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.2.5

      - name: Configurar Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21e

      - name: Instalar librerías de Haxe y FNF
        run: |
          haxelib setup ~/haxelib
          haxelib install lime 8.0.1 --quiet
          haxelib install openfl 9.3.3 --quiet
          haxelib install flixel 5.5.0 --quiet
          haxelib install flixel-addons 3.3.2 --quiet
          haxelib install flixel-ui --quiet
          haxelib install flixel-tools --quiet
          haxelib install hscript --quiet
          haxelib install hxcpp --quiet
          haxelib install actuate --quiet
          haxelib install extension-haptics --quiet || haxelib git extension-haptics https://github.com/crowplexus/extension-haptics
          haxelib git extension-androidtools https://github.com/MA-Teo/extension-androidtools --quiet || true
          haxelib git hxCodec https://github.com/polybiusproxy/hxCodec --quiet || true
          haxelib git linc_luajit https://github.com/nebulastream/linc_luajit --quiet || true

          haxelib run lime setup
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME

      - name: Compilar APK
        run: |
          haxelib run lime build android -final

      - name: Subir el APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Mod-P-Slice-Android
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk
