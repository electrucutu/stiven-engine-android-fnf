name: Compilar APK Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener repositorio
        uses: actions/checkout@v4

      - name: Descargar y descomprimir juego desde Pixeldrain
        run: |
          curl -L -o stivenengine.zip "https://pixeldrain.com/api/file/cX7e7QuG"
          unzip -o stivenengine.zip -d .
          rm stivenengine.zip

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Haxe 4.2.5 directamente
        run: |
          wget -q https://github.com/HaxeFoundation/haxe/releases/download/4.2.5/haxe-4.2.5-linux64.tar.gz
          tar -xf haxe-4.2.5-linux64.tar.gz
          cd haxe_*
          sudo cp haxe haxelib /usr/local/bin/
          sudo mkdir -p /usr/local/share/haxe
          sudo cp -r std /usr/local/share/haxe/
          echo "HAXE_STD_PATH=/usr/local/share/haxe/std" >> $GITHUB_ENV

      - name: Instalar Android NDK y Librerias
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;21.4.7075529"
          
          mkdir -p ~/haxelib
          haxelib setup ~/haxelib
          haxelib install lime 8.0.1 --quiet
          haxelib install openfl 9.3.3 --quiet
          haxelib install flixel 5.5.0 --quiet
          
          haxelib run lime setup
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_HOME/ndk/21.4.7075529
          haxelib run lime config JAVA_HOME $JAVA_HOME

      - name: Compilar APK
        run: |
          haxelib run lime build android -final

      - name: Subir el APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Mod-P-Slice-Android
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk
